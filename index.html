<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>湘阴县城区内涝三维可视化系统</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    html, body, #map { height: 100%; margin: 0; padding: 0; }
    .time-slider { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; z-index: 1000; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="time-slider">
    <input type="range" id="timeSlider" min="0" max="0" value="0">
    <span id="timeLabel">0:00:00</span>
  </div>
  <script src="main.js"></script>
</body>
</html>
